version: 2

builds:
  - id: wdxtools
    main: ./cmd/wdxtools
    binary: wdxtools
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: wdxtools
    builds:
      - wdxtools
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: wdxtools
    ids:
      - wdxtools
    repository:
      owner: wilmanbarrios
      name: homebrew-wdxtools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/wilmanbarrios/wdxtools"
    description: "Everyday formatting tools for the command line"
    license: "MIT"
    install: |
      bin.install "wdxtools"
      bin.install_symlink "wdxtools" => "diffh"
      bin.install_symlink "wdxtools" => "numcrn"
    test: |
      assert_match "ago", shell_output("#{bin}/wdxtools diffh 2000-01-01").strip
      assert_equal "1K", shell_output("#{bin}/wdxtools numcrn 1000").strip
